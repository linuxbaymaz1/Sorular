services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: tsdb_bench
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=bench_pass
    command: ["postgres", "-c", "max_connections=100", "-c", "shared_buffers=1GB"]
    cpus: 2
    mem_limit: 2g

  questdb:
    image: questdb/questdb:latest
    container_name: quest_bench
    ports:
      - "8812:8812"
      - "9000:9000"
    cpus: 2
    mem_limit: 2g

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ch_bench
    ports:
      - "8123:8123"
      - "9001:9000"
    cpus: 2
    mem_limit: 2g

networks:
  default:
    name: bench_net
